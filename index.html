<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SVAMITVA – South Gujarat</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0a1520;color:#fff;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
/* Header */
#hdr{background:#06101a;padding:8px 14px 6px;border-bottom:1px solid #1a2d40;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:8px}
#hdr h1{font-size:13px;font-weight:700;color:#e2f0ff;white-space:nowrap}
#hdr p{font-size:10px;color:#4a7090;margin-top:1px}
#gps-pill{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #1a2d40;background:#112030;color:#6b9ab8;cursor:pointer;flex-shrink:0;white-space:nowrap}
#gps-pill.on{background:#0d2a1a;border-color:#2e7d52;color:#4caf50}
#gps-pill.err{background:#2a0d0d;border-color:#7d2e2e;color:#ef5350}
/* District bar */
#dist-bar{display:flex;gap:6px;padding:6px 14px;background:#040c14;border-bottom:1px solid #1a2d40;overflow-x:auto;flex-shrink:0;scrollbar-width:none;align-items:center}
#dist-bar::-webkit-scrollbar{display:none}
.dist-label{font-size:10px;color:#3a5570;flex-shrink:0;margin-right:2px}
.dk{padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid #1a2d40;background:#112030;color:#8aafc8;cursor:pointer;white-space:nowrap;flex-shrink:0}
.dk.active{background:#0d2a1a;border-color:#2e7d52;color:#4caf50}
#hdfc-toggle{margin-left:auto;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid #1e3a5a;background:#0d1e30;color:#64b5f6;cursor:pointer;white-space:nowrap;flex-shrink:0}
#hdfc-toggle.on{background:#1a2a3a;border-color:#1976d2;color:#90caf9}
/* Taluka bar */
#tk-bar{display:flex;gap:6px;padding:6px 14px;background:#06101a;border-bottom:1px solid #1a2d40;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#tk-bar::-webkit-scrollbar{display:none}
.tk{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid #1a2d40;background:#112030;color:#6b9ab8;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tk.active{background:#1565c0;border-color:#1976d2;color:#fff}
/* Stats */
#sbar{display:flex;gap:6px;padding:5px 14px;background:#08131e;border-bottom:1px solid #1a2d40;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#sbar::-webkit-scrollbar{display:none}
.st{background:#112030;border-radius:7px;padding:4px 9px;white-space:nowrap;flex-shrink:0;font-size:10px;color:#4a7090}
.st strong{display:block;font-size:13px;font-weight:700;color:#e2f0ff;line-height:1.2}
/* Tabs */
#tabbar{display:flex;background:#06101a;border-bottom:1px solid #1a2d40;flex-shrink:0}
.tab{flex:1;padding:8px 0;text-align:center;font-size:12px;font-weight:600;color:#4a7090;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#64b5f6;border-bottom-color:#1976d2}
/* Filter */
#fbar{display:flex;gap:6px;padding:6px 14px;background:#0a1520;border-bottom:1px solid #1a2d40;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#fbar::-webkit-scrollbar{display:none}
.fb{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid #1a2d40;background:#112030;color:#6b9ab8;cursor:pointer;white-space:nowrap;flex-shrink:0}
.fb.active{background:#1565c0;border-color:#1976d2;color:#fff}
/* Map */
#map-view{flex:1;display:flex;flex-direction:column;overflow:hidden}
#map{flex:1;z-index:1}
#legend{position:absolute;bottom:82px;right:10px;background:rgba(6,16,26,.93);border:1px solid #1a2d40;border-radius:10px;padding:7px 10px;z-index:999;font-size:10px;color:#6b9ab8}
#legend div{display:flex;align-items:center;gap:5px;margin-bottom:3px}
#legend div:last-child{margin-bottom:0}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#gpsBtn{position:absolute;bottom:20px;right:10px;background:#1565c0;border:none;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(21,101,192,.5);cursor:pointer;z-index:999;color:#fff;font-size:18px}
#gpsBtn:active{transform:scale(.92)}
/* Panel */
#panel{position:absolute;bottom:-360px;left:0;right:0;background:#06101a;border-top:1px solid #1a2d40;border-radius:18px 18px 0 0;padding:14px;z-index:1000;transition:bottom .3s ease;box-shadow:0 -8px 32px rgba(0,0,0,.7)}
#panel.open{bottom:0}
#ph{width:34px;height:4px;background:#1a2d40;border-radius:2px;margin:0 auto 12px}
#pv-nm{font-size:16px;font-weight:700;color:#e2f0ff}
#pv-mt{font-size:10px;color:#4a7090;margin-top:2px;margin-bottom:10px}
#pv-cd{background:#112030;border-radius:10px;padding:9px 13px;display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
#pv-cd .lb{font-size:10px;color:#4a7090}
#pv-cd .vl{font-size:28px;font-weight:800}
#pv-ds{font-size:11px;color:#6b9ab8;margin-bottom:7px}
#pv-br{height:5px;background:#112030;border-radius:3px;margin-bottom:12px;overflow:hidden}
#pv-bf{height:100%;border-radius:3px;transition:width .4s}
.br{display:flex;gap:6px}
.btn{flex:1;padding:10px 5px;border:none;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer}
.btn-nv{background:#1565c0;color:#fff}
.btn-vw{background:#1a3a1a;border:1px solid #2e7d52;color:#4caf50}
.btn-dl{background:#1a2a3a;border:1px solid #1976d2;color:#64b5f6}
.btn-na{background:#141e28;border:1px solid #1a2d40;color:#2a4a6a;cursor:default}
.btn-cl{background:#112030;color:#6b9ab8;flex:0 0 40px;padding:10px 0}
/* Table */
#tbl-view{flex:1;display:none;flex-direction:column;overflow:hidden}
#tbl-s{margin:8px 14px 5px;padding:8px 12px;border-radius:10px;border:1px solid #1a2d40;background:#112030;color:#e2f0ff;font-size:13px;width:calc(100% - 28px);outline:none}
#tbl-s::placeholder{color:#2a4a6a}
#tsort{display:flex;gap:6px;padding:0 14px 7px;overflow-x:auto;scrollbar-width:none}
#tsort::-webkit-scrollbar{display:none}
.ts{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid #1a2d40;background:#112030;color:#6b9ab8;cursor:pointer;white-space:nowrap;flex-shrink:0}
.ts.active{background:#1565c0;border-color:#1976d2;color:#fff}
#tw{flex:1;overflow-y:auto;padding:0 14px 20px;-webkit-overflow-scrolling:touch}
.tr{display:flex;align-items:center;gap:8px;padding:9px 11px;background:#112030;border-radius:10px;margin-bottom:6px;cursor:pointer}
.tr:active{background:#1a3050}
.trk{font-size:10px;color:#2a4a6a;width:18px;text-align:center;flex-shrink:0}
.trd{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.trb{flex:1;min-width:0}
.trn{font-size:12px;font-weight:600;color:#e2f0ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trs{font-size:10px;color:#2a4a6a;margin-top:1px}
.trbb{height:3px;background:#0a1520;border-radius:2px;margin-top:4px;overflow:hidden;max-width:100px}
.trbf{height:100%;border-radius:2px}
.trr{text-align:right;flex-shrink:0}
.trc{font-size:15px;font-weight:800}
.trdst{font-size:10px;color:#4a7090;margin-top:1px}
.tra{display:flex;gap:4px;flex-shrink:0}
.tgo{background:#1565c044;border:1px solid #1976d2;color:#64b5f6;border-radius:7px;padding:4px 7px;font-size:10px;font-weight:600;cursor:pointer}
.tvw{background:#1a3a1a;border:1px solid #2e7d52;color:#4caf50;border-radius:7px;padding:4px 7px;font-size:10px;font-weight:600;cursor:pointer}
.tdl{background:#1a2a3a;border:1px solid #1976d2;color:#64b5f6;border-radius:7px;padding:4px 7px;font-size:10px;font-weight:600;cursor:pointer}
.tna{background:#141e28;border:1px solid #1a2030;color:#2a3a4a;border-radius:7px;padding:4px 7px;font-size:10px;cursor:default}
/* Leaflet */
.leaflet-popup-content-wrapper{background:#06101a!important;border:1px solid #1a2d40!important;border-radius:10px!important;box-shadow:0 4px 20px rgba(0,0,0,.6)!important;color:#e2f0ff!important;padding:0!important}
.leaflet-popup-content{margin:0!important}
.leaflet-popup-tip{background:#06101a!important}
.leaflet-popup-close-button{color:#4a7090!important;top:6px!important;right:8px!important}
.leaflet-control-zoom{border:1px solid #1a2d40!important;border-radius:8px!important;overflow:hidden}
.leaflet-control-zoom a{background:#112030!important;color:#6b9ab8!important;border-bottom:1px solid #1a2d40!important}
.leaflet-control-attribution{background:rgba(6,16,26,.4)!important;color:#0e1e2e!important;font-size:8px!important}
</style>
</head>
<body>
<div id="hdr">
  <div><h1>&#128205; SVAMITVA – South Gujarat</h1><p id="hdr-sub">Select district &amp; taluka</p></div>
  <div id="gps-pill" onclick="reqGPS()">&#9711; Location</div>
</div>
<!-- District bar -->
<div id="dist-bar">
  <span class="dist-label">District:</span>
  <button class="dk active" onclick="setDist('surat',this)">Surat</button>
  <button class="dk" onclick="setDist('navsari',this)">Navsari</button>
  <button class="dk" onclick="setDist('valsad',this)">Valsad</button>
  <button id="hdfc-toggle" onclick="toggleHDFC()">&#127974; HDFC OFF</button>
</div>
<!-- Taluka bar -->
<div id="tk-bar"></div>
<!-- Stats -->
<div id="sbar">
  <div class="st"><strong id="s-tot">—</strong>Cards</div>
  <div class="st"><strong id="s-vil">—</strong>Villages</div>
  <div class="st"><strong id="s-top">—</strong>Top Village</div>
  <div class="st" id="s-nr-w"><strong id="s-nr">—</strong>Nearest</div>
</div>
<!-- Tabs -->
<div id="tabbar">
  <div class="tab active" id="tab-map" onclick="switchTab('map')">&#128506; Map</div>
  <div class="tab" id="tab-tbl" onclick="switchTab('table')">&#9776; Table</div>
</div>
<!-- MAP VIEW -->
<div id="map-view">
  <div id="fbar">
    <button class="fb active" id="fb-all" onclick="fMap('all')">All</button>
    <button class="fb" id="fb-hi" onclick="fMap('high')">150+</button>
    <button class="fb" id="fb-md" onclick="fMap('mid')">75-149</button>
    <button class="fb" id="fb-lo" onclick="fMap('low')">&lt;75</button>
    <button class="fb" id="fb-nr" onclick="nearSort()">Nearest &#8595;</button>
  </div>
  <div id="map"></div>
  <div id="legend">
    <div><span class="dot" style="background:#ef5350"></span>200+</div>
    <div><span class="dot" style="background:#ff9800"></span>100-199</div>
    <div><span class="dot" style="background:#4caf50"></span>50-99</div>
    <div><span class="dot" style="background:#78909c"></span>&lt;50</div>
    <div><span class="dot" style="background:#1976d2"></span>HDFC</div>
  </div>
  <button id="gpsBtn" onclick="reqGPS()">&#9711;</button>
</div>
<!-- TABLE VIEW -->
<div id="tbl-view">
  <input id="tbl-s" type="text" placeholder="Search village..." oninput="renderTbl()">
  <div id="tsort">
    <button class="ts active" id="ts-c" onclick="setSort('count')">Most Cards &#8595;</button>
    <button class="ts" id="ts-n" onclick="setSort('name')">A - Z</button>
    <button class="ts" id="ts-d" onclick="setSort('dist')">Nearest</button>
  </div>
  <div id="tw"></div>
</div>
<!-- Bottom panel -->
<div id="panel">
  <div id="ph"></div>
  <div id="pv-nm">—</div>
  <div id="pv-mt">—</div>
  <div id="pv-cd">
    <div><div class="lb">Property Cards Issued</div><div class="vl" id="pv-ct">0</div></div>
    <div id="pv-bg" style="font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;border:1px solid transparent"></div>
  </div>
  <div id="pv-ds">&#128205; Tap GPS to see distance</div>
  <div id="pv-br"><div id="pv-bf"></div></div>
  <div class="br">
    <button class="btn btn-nv" onclick="navTo()">&#128506; Navigate</button>
    <button class="btn btn-vw" id="b-vw" onclick="vwPDF()">&#128065; View PDF</button>
    <button class="btn btn-dl" id="b-dl" onclick="dlPDF()">&#8659; Download</button>
    <button class="btn btn-cl" onclick="closeP()">&#10005;</button>
  </div>
</div>

    b.className='tk'+(i===0?' active':'');
    b.textContent=DATA[k].label;
    b.onclick=function(){setTK(k,b);};
    bar.appendChild(b);
  });
}

}
function loadTK(){
  var td=DATA[curTK];
  allMk.forEach(function(o){map.removeLayer(o.m);});
  allMk=[];
  var vs=td.v;
  var tot=vs.reduce(function(s,v){return s+v.cnt;},0);
  var top=vs.slice().sort(function(a,b){return b.cnt-a.cnt;})[0];
  var mx=top.cnt;
  document.getElementById('s-tot').textContent=tot.toLocaleString();
  document.getElementById('s-vil').textContent=vs.length;
  document.getElementById('s-top').textContent=top.n+' ('+top.cnt+')';
  document.getElementById('hdr-sub').textContent=DATA[curDist].label+' › '+td.label+' · '+vs.length+' villages';
  vs.forEach(function(v){
    v._mx=mx;
    var c=gc(v.cnt),r=7+Math.round((v.cnt/mx)*13),sz=r*2;
    var icon=L.divIcon({className:'',html:'<div style="width:'+sz+'px;height:'+sz+'px;background:'+c+';border:2px solid rgba(255,255,255,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:'+(sz>22?9:7)+'px;font-weight:700;color:#fff;box-shadow:0 0 '+r+'px '+c+'44;cursor:pointer;">'+v.cnt+'</div>',iconSize:[sz,sz],iconAnchor:[r,r]});
    var m=L.marker([v.lat,v.lng],{icon:icon}).addTo(map);
    m.on('click',function(){openP(v);});
    allMk.push({m:m,v:v});
  });
  map.setView(td.center,td.zoom);
  updNear();
  renderTbl();
}

/* ── HDFC LAYER ── */
function toggleHDFC(){
  hdfcOn=!hdfcOn;
  var btn=document.getElementById('hdfc-toggle');
  btn.textContent='\uD83C\uDFE6 HDFC '+(hdfcOn?'ON':'OFF');
  btn.className=hdfcOn?'on':'';
  if(hdfcOn){
    HDFC.forEach(function(b){
      var icon=L.divIcon({className:'',html:'<div style="width:28px;height:28px;background:#1565c0;border:2px solid #64b5f6;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 8px #1976d2aa;">&#127974;</div>',iconSize:[28,28],iconAnchor:[14,14]});
      var m=L.marker([b.lat,b.lng],{icon:icon}).addTo(map);
      m.bindPopup('<div style="padding:8px 10px;min-width:160px"><div style="font-weight:600;font-size:13px;color:#e2f0ff">'+b.n+'</div><div style="font-size:11px;color:#6b9ab8;margin-top:3px">'+b.addr+'</div></div>',{className:'',closeButton:true});
      hdfcMk.push(m);
    });
  } else {
    hdfcMk.forEach(function(m){map.removeLayer(m);});
    hdfcMk=[];
  }
}

/* ── PANEL ── */
function openP(v){
  selV=v;
  var c=gc(v.cnt);
  document.getElementById('pv-nm').textContent=v.n;
  document.getElementById('pv-mt').textContent='Code: '+v.c+' · '+DATA[curTK].label+', '+DATA[curDist].label;
  document.getElementById('pv-ct').textContent=v.cnt;
  document.getElementById('pv-ct').style.color=c;
  var b=document.getElementById('pv-bg');
  b.textContent=tier(v.cnt);b.style.background=c+'22';b.style.color=c;b.style.borderColor=c+'55';
  document.getElementById('pv-bf').style.width=Math.round((v.cnt/v._mx)*100)+'%';
  document.getElementById('pv-bf').style.background=c;
  document.getElementById('pv-ds').textContent=userLat!==null?'📍 '+fd(hav(userLat,userLng,v.lat,v.lng))+' from you':'📍 Tap GPS to see distance';
  var has=hasPDF(curTK,v.n);
  document.getElementById('b-vw').className='btn '+(has?'btn-vw':'btn-na');
  document.getElementById('b-vw').textContent=has?'👁 View PDF':'PDF soon';
  document.getElementById('b-dl').className='btn '+(has?'btn-dl':'btn-na');
  document.getElementById('b-dl').textContent=has?'⬇ Download':'PDF soon';
  document.getElementById('panel').classList.add('open');
}
function closeP(){document.getElementById('panel').classList.remove('open');selV=null;}
function navTo(){if(!selV)return;window.open('https://www.google.com/maps/dir/?api=1&destination='+selV.lat+','+selV.lng+'&travelmode=driving','_blank');}
function vwPDF(){if(!selV||!hasPDF(curTK,selV.n))return;window.open(pdfURL(curTK,selV.n),'_blank');}
function dlPDF(){
  if(!selV||!hasPDF(curTK,selV.n))return;
  var url=pdfURL(curTK,selV.n),nm=selV.n;
  fetch(url).then(function(r){return r.blob();}).then(function(bl){
    var a=document.createElement('a');a.href=URL.createObjectURL(bl);a.download=nm+'.pdf';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
  }).catch(function(){window.open(url,'_blank');});
}

/* ── FILTERS ── */
function setFb(id){['fb-all','fb-hi','fb-md','fb-lo','fb-nr'].forEach(function(x){document.getElementById(x).classList.remove('active');});document.getElementById(id).classList.add('active');}
function fMap(t){setFb({all:'fb-all',high:'fb-hi',mid:'fb-md',low:'fb-lo'}[t]||'fb-all');allMk.forEach(function(o){var s=t==='all'||(t==='high'&&o.v.cnt>=150)||(t==='mid'&&o.v.cnt>=75&&o.v.cnt<150)||(t==='low'&&o.v.cnt<75);s?(!map.hasLayer(o.m)&&o.m.addTo(map)):(map.hasLayer(o.m)&&map.removeLayer(o.m));});}
function nearSort(){if(userLat===null){alert('Tap GPS button first');return;}setFb('fb-nr');allMk.forEach(function(o){if(!map.hasLayer(o.m))o.m.addTo(map);});var s=DATA[curTK].v.slice().sort(function(a,b){return hav(userLat,userLng,a.lat,a.lng)-hav(userLat,userLng,b.lat,b.lng);});map.setView([s[0].lat,s[0].lng],14);openP(s[0]);}

/* ── GPS ── */
function setPill(st,txt){var p=document.getElementById('gps-pill');p.className='';p.id='gps-pill';if(st==='on')p.classList.add('on');if(st==='err')p.classList.add('err');p.textContent=txt;}
function onPos(pos){
  userLat=pos.coords.latitude;userLng=pos.coords.longitude;
  setPill('on','● GPS On');
  if(gpsM){map.removeLayer(gpsM);map.removeLayer(gpsC);}
  gpsC=L.circle([userLat,userLng],{radius:pos.coords.accuracy,color:'#1976d2',fillColor:'#1976d2',fillOpacity:0.1,weight:1}).addTo(map);
  gpsM=L.marker([userLat,userLng],{icon:L.divIcon({className:'',html:'<div style="width:16px;height:16px;background:#1976d2;border:3px solid #fff;border-radius:50%;box-shadow:0 0 12px rgba(25,118,210,.9);"></div>',iconSize:[16,16],iconAnchor:[8,8]}),zIndexOffset:1000}).addTo(map);
  updNear();
  if(selV)openP(selV);
}
function onErr(e){setPill('err',e.code===1?'⚠ Blocked':'⚠ GPS error');}
function reqGPS(){
  if(!navigator.geolocation){alert('Geolocation not supported');return;}
  setPill('','⟳ Locating...');
  navigator.geolocation.getCurrentPosition(function(pos){
    onPos(pos);map.setView([pos.coords.latitude,pos.coords.longitude],13);
    if(!gpsW){gpsW=true;navigator.geolocation.watchPosition(onPos,onErr,{enableHighAccuracy:true,maximumAge:5000,timeout:20000});}
  },onErr,{enableHighAccuracy:true,timeout:20000});
}
function updNear(){
  if(userLat===null)return;
  var s=DATA[curTK].v.slice().sort(function(a,b){return hav(userLat,userLng,a.lat,a.lng)-hav(userLat,userLng,b.lat,b.lng);});
  document.getElementById('s-nr').textContent=s[0].n+' ('+hav(userLat,userLng,s[0].lat,s[0].lng).toFixed(1)+'km)';
}

/* ── TABS ── */
function switchTab(t){
  document.getElementById('tab-map').classList.toggle('active',t==='map');
  document.getElementById('tab-tbl').classList.toggle('active',t==='table');
  document.getElementById('map-view').style.display=t==='map'?'flex':'none';
  document.getElementById('tbl-view').style.display=t==='table'?'flex':'none';
  if(t==='map')map.invalidateSize();
  if(t==='table')renderTbl();
}

/* ── TABLE ── */
function setSort(s){
  if(s==='dist'&&userLat===null){alert('Tap GPS button first');return;}
  tSort=s;
  ['ts-c','ts-n','ts-d'].forEach(function(x){document.getElementById(x).classList.remove('active');});
  document.getElementById('ts-'+s.charAt(0)).classList.add('active');
  renderTbl();
}
function renderTbl(){
  var q=(document.getElementById('tbl-s').value||'').toLowerCase().trim();
  var vs=DATA[curTK].v.filter(function(v){return !q||v.n.toLowerCase().indexOf(q)>=0;});
  if(tSort==='count')vs.sort(function(a,b){return b.cnt-a.cnt;});
  else if(tSort==='name')vs.sort(function(a,b){return a.n.localeCompare(b.n);});
  else if(tSort==='dist'&&userLat!==null)vs.sort(function(a,b){return hav(userLat,userLng,a.lat,a.lng)-hav(userLat,userLng,b.lat,b.lng);});
  var mx=DATA[curTK].v.reduce(function(m,v){return Math.max(m,v.cnt);},1);
  var html='';
  vs.forEach(function(v,i){
    var c=gc(v.cnt),dStr=userLat!==null?fd(hav(userLat,userLng,v.lat,v.lng)):'—',bw=Math.round((v.cnt/mx)*100),has=hasPDF(curTK,v.n);
    html+='<div class="tr" onclick="rowTap(\''+v.c+'\')">'
      +'<span class="trk">'+(i+1)+'</span>'
      +'<span class="trd" style="background:'+c+'"></span>'
      +'<div class="trb"><div class="trn">'+v.n+'</div><div class="trs">'+v.c+'</div>'
      +'<div class="trbb"><div class="trbf" style="width:'+bw+'%;background:'+c+'"></div></div></div>'
      +'<div class="trr"><div class="trc" style="color:'+c+'">'+v.cnt+'</div><div class="trdst">'+dStr+'</div></div>'
      +'<div class="tra">'
      +'<button class="tgo" onclick="event.stopPropagation();goN('+v.lat+','+v.lng+')">Go</button>'
      +(has?'<button class="tvw" onclick="event.stopPropagation();window.open(\''+pdfURL(curTK,v.n)+'\',\'_blank\')">View</button>':'')
      +(has?'<button class="tdl" onclick="event.stopPropagation();dlF(\''+pdfURL(curTK,v.n)+'\',\''+v.n+'\')">DL</button>':'<button class="tna" disabled>PDF</button>')
      +'</div></div>';
  });
  if(!html)html='<p style="text-align:center;color:#1a3050;padding:30px 0;font-size:13px;">No villages found</p>';
  document.getElementById('tw').innerHTML=html;
}
function rowTap(code){
  var v=DATA[curTK].v.find(function(x){return x.c===code;});
  if(!v)return;
  v._mx=DATA[curTK].v.reduce(function(m,x){return Math.max(m,x.cnt);},1);
  switchTab('map');map.setView([v.lat,v.lng],14);openP(v);
}
function goN(lat,lng){window.open('https://www.google.com/maps/dir/?api=1&destination='+lat+','+lng+'&travelmode=driving','_blank');}
function dlF(url,nm){
  fetch(url).then(function(r){return r.blob();}).then(function(bl){
    var a=document.createElement('a');a.href=URL.createObjectURL(bl);a.download=nm+'.pdf';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
  }).catch(function(){window.open(url,'_blank');});
}

/* INIT */
map.on('click',closeP);
buildTKBar();
loadTK();
</script>
</body>
</html>
