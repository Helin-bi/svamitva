*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0a1520;color:#fff;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#header{background:#06101a;padding:8px 14px 6px;border-bottom:1px solid #1a2d40;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:8px}
#header h1{font-size:13px;font-weight:700;color:#e2f0ff;white-space:nowrap}
#header p{font-size:10px;color:#4a7090;margin-top:1px}
#gps-pill{font-size:11px;padding:5px 11px;border-radius:20px;border:1px solid #1a2d40;background:#112030;color:#6b9ab8;cursor:pointer;flex-shrink:0;white-space:nowrap}
#gps-pill.on{background:#0d2a1a;border-color:#2e7d52;color:#4caf50}
#gps-pill.err{background:#2a0d0d;border-color:#7d2e2e;color:#ef5350}
#dist-bar{display:flex;gap:6px;padding:6px 14px;background:#04090f;border-bottom:1px solid #1a2d40;flex-shrink:0}
.dk-btn{padding:5px 16px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid #1a2d40;background:#112030;color:#6b9ab8;cursor:pointer;white-space:nowrap}
.dk-btn.active{background:#0d2a3a;border-color:#0d7a9a;color:#29b6d8}
#taluka-bar{display:flex;gap:6px;padding:6px 14px;background:#06101a;border-bottom:1px solid #1a2d40;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#taluka-bar::-webkit-scrollbar{display:none}
.tk-btn{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid #1a2d40;background:#112030;color:#6b9ab8;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tk-btn.active{background:#1565c0;border-color:#1976d2;color:#fff}
#statsbar{display:flex;gap:6px;padding:5px 14px;background:#08131e;border-bottom:1px solid #1a2d40;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#statsbar::-webkit-scrollbar{display:none}
.stat{background:#112030;border-radius:7px;padding:4px 9px;white-space:nowrap;flex-shrink:0;font-size:10px;color:#4a7090}
.stat strong{display:block;font-size:14px;font-weight:700;color:#e2f0ff;line-height:1.2}
#tabbar{display:flex;background:#06101a;border-bottom:1px solid #1a2d40;flex-shrink:0}
.tab{flex:1;padding:8px 0;text-align:center;font-size:12px;font-weight:600;color:#4a7090;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#64b5f6;border-bottom-color:#1976d2}
#filterbar{display:flex;gap:6px;padding:6px 14px;background:#0a1520;border-bottom:1px solid #1a2d40;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#filterbar::-webkit-scrollbar{display:none}
.f-btn{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid #1a2d40;background:#112030;color:#6b9ab8;cursor:pointer;white-space:nowrap;flex-shrink:0}
.f-btn.active{background:#1565c0;border-color:#1976d2;color:#fff}
#map-view{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#map{flex:1;z-index:1;min-height:0}
/* Invert OSM tiles to dark */
.leaflet-tile{filter:invert(1) hue-rotate(180deg) brightness(0.85) contrast(0.9) saturate(0.45)}
#legend{position:absolute;bottom:86px;right:10px;background:rgba(6,16,26,.93);border:1px solid #1a2d40;border-radius:10px;padding:7px 10px;z-index:999;font-size:10px;color:#6b9ab8}
#legend div{display:flex;align-items:center;gap:5px;margin-bottom:3px}
#legend div:last-child{margin-bottom:0}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#gpsBtn{position:absolute;bottom:22px;right:10px;background:#1565c0;border:none;border-radius:50%;width:46px;height:46px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(21,101,192,.5);cursor:pointer;z-index:999;color:#fff;font-size:19px}
#gpsBtn:active{transform:scale(.92)}
#panel{position:absolute;bottom:-400px;left:0;right:0;background:#06101a;border-top:1px solid #1a2d40;border-radius:18px 18px 0 0;padding:14px;z-index:1000;transition:bottom .3s ease;box-shadow:0 -8px 32px rgba(0,0,0,.7)}

#pv-name{font-size:16px;font-weight:700;color:#e2f0ff}
#pv-meta{font-size:10px;color:#4a7090;margin-top:2px;margin-bottom:10px}
#pv-cards{background:#112030;border-radius:10px;padding:9px 13px;display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
#pv-cards .lbl{font-size:10px;color:#4a7090}
#pv-cards .val{font-size:28px;font-weight:800}
#pv-dist{font-size:11px;color:#6b9ab8;margin-bottom:7px}
#pv-bar{height:5px;background:#112030;border-radius:3px;margin-bottom:12px;overflow:hidden}
#pv-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.btn-row{display:flex;gap:7px}
.btn{flex:1;padding:11px 6px;border:none;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer}
.btn-nav{background:#1565c0;color:#fff}
.btn-view{background:#1a3a1a;border:1px solid #2e7d52;color:#4caf50}
.btn-dl{background:#1a2a3a;border:1px solid #1976d2;color:#64b5f6}
.btn-na{background:#141e28;border:1px solid #1a2d40;color:#2a4a6a;cursor:default}
.btn-close{background:#112030;color:#6b9ab8;flex:0 0 42px;padding:11px 0}
#table-view{flex:1;display:none;flex-direction:column;overflow:hidden;min-height:0}
#tbl-search{margin:9px 14px 6px;padding:8px 12px;border-radius:10px;border:1px solid #1a2d40;background:#112030;color:#e2f0ff;font-size:13px;width:calc(100% - 28px);outline:none}
#tbl-search::placeholder{color:#2a4a6a}
#tbl-sort-row{display:flex;gap:6px;padding:0 14px 7px;overflow-x:auto;scrollbar-width:none}

.ts{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid #1a2d40;background:#112030;color:#6b9ab8;cursor:pointer;white-space:nowrap;flex-shrink:0}
.ts.active{background:#1565c0;border-color:#1976d2;color:#fff}
#tbl-wrap{flex:1;overflow-y:auto;padding:0 14px 20px;-webkit-overflow-scrolling:touch}
.tr{display:flex;align-items:center;gap:8px;padding:9px 11px;background:#112030;border-radius:10px;margin-bottom:6px;cursor:pointer}
.tr:active{background:#1a3050}
.tr-rank{font-size:10px;color:#2a4a6a;width:18px;text-align:center;flex-shrink:0}
.tr-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tr-body{flex:1;min-width:0}
.tr-name{font-size:12px;font-weight:600;color:#e2f0ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

<div id="header">
  <div><h1>&#128205; SVAMITVA &#8212; South Gujarat</h1><p id="hdr-sub">Select a district &amp; taluka</p></div>
  <div id="gps-pill" onclick="requestGPS()">&#9711; Get Location</div>
</div>
<div id="dist-bar">
  <button class="dk-btn active" onclick="setDistrict('surat',this)">Surat</button>
  <button class="dk-btn" onclick="setDistrict('navsari',this)">Navsari</button>
  <button class="dk-btn" onclick="setDistrict('valsad',this)">Valsad</button>
</div>
<div id="taluka-bar"></div>
<div id="statsbar">
  <div class="stat"><strong id="s-total">&#8212;</strong>Cards</div>
  <div class="stat"><strong id="s-villages">&#8212;</strong>Villages</div>
  <div class="stat"><strong id="s-top">&#8212;</strong>Top Village</div>
  <div class="stat"><strong id="s-near">&#8212;</strong>Nearest</div>
</div>
<div id="tabbar">
  <div class="tab active" id="tab-map" onclick="switchTab('map')">&#128506; Map</div>
  <div class="tab" id="tab-tbl" onclick="switchTab('table')">&#9776; Table</div>
</div>
<div id="map-view">
  <div id="filterbar">
    <button class="f-btn active" id="fb-all" onclick="filterMap('all')">All</button>
    <button class="f-btn" id="fb-high" onclick="filterMap('high')">High 150+</button>
    <button class="f-btn" id="fb-med" onclick="filterMap('medium')">Mid 75-149</button>
    <button class="f-btn" id="fb-low" onclick="filterMap('low')">Low &lt;75</button>
    <button class="f-btn" id="fb-near" onclick="sortByNearest()">Nearest &#8595;</button>
  </div>
  <div id="map"></div>
  <div id="legend">
    <div><span class="dot" style="background:#ef5350"></span>200+</div>
    <div><span class="dot" style="background:#ff9800"></span>100-199</div>
    <div><span class="dot" style="background:#4caf50"></span>50-99</div>
    <div><span class="dot" style="background:#78909c"></span>&lt;50</div>
  </div>
  <button id="gpsBtn" onclick="requestGPS()">&#9711;</button>
</div>
<div id="table-view">
  <input id="tbl-search" type="text" placeholder="Search village..." oninput="renderTable()">
  <div id="tbl-sort-row">
    <button class="ts active" id="ts-count" onclick="setSort('count')">Most Cards &#8595;</button>
    <button class="ts" id="ts-name" onclick="setSort('name')">A - Z</button>
    <button class="ts" id="ts-dist" onclick="setSort('dist')">Nearest</button>
  </div>
  <div id="tbl-wrap"></div>
</div>
<div id="panel">
  <div id="ph"></div>
  <div id="pv-name">&#8212;</div>
  <div id="pv-meta">&#8212;</div>
  <div id="pv-cards">
    <div><div class="lbl">Property Cards Issued</div><div class="val" id="pv-count">0</div></div>
    <div id="pv-badge" style="font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;border:1px solid transparent"></div>
  </div>
  <div id="pv-dist">&#128205; Tap GPS button to see distance</div>
  <div id="pv-bar"><div id="pv-bar-fill"></div></div>
  <div class="btn-row">
    <button class="btn btn-nav" onclick="navigateTo()">&#128506; Navigate</button>
    <button class="btn btn-view" id="btn-view-panel" onclick="viewPDF()">&#128065; View PDF</button>
    <button class="btn btn-dl"   id="btn-dl-panel"   onclick="dlPDF()">&#8659; Download</button>
    <button class="btn btn-close" onclick="closePanel()">&#10005;</button>
  </div>
</div>

  var n=parseInt(c);

        ['Jespor','523230',1],['Khajurdi','523256',24],['Kochwada','523268',1],
        ['Magod Dungri','523294',1],['Meh','523296',38],['Muli','523261',8],
        ['Navera','523302',1],['Palan','523257',8],['Pitha','523270',53],
        ['Rola','523236',2],['Ronvel','523287',57],['Sarangpur','523272',10],
        ['Segva','523260',1],['Segvi (Part)','523280',31],['Tithal (Og)','523322',9],
        ['Umarsadi','523242',1],['Untdi','523229',248],['Vasan','523232',26],
        ['Velvach','523311',32]
      ];
      return d.map(function(x){var co=vc(x[1],20.53,20.66,72.85,72.99);return{n:x[0],c:x[1],lat:co.lat,lng:co.lng,cnt:x[2]};});
    })()},

  vapi:{label:'Vapi',district:'valsad',center:[20.37,72.91],zoom:11,pdfs:[],
    villages:(function(){
      var d=[
        ['Koparli','523493',69],['Morai','523469',56],['Pandor','523486',13],['Tarakpardi','523466',34]
      ];
      return d.map(function(x){var co=vc(x[1],20.30,20.43,72.84,72.98);return{n:x[0],c:x[1],lat:co.lat,lng:co.lng,cnt:x[2]};});
    })()}
};

// District registry
var DISTRICTS={
  surat:{label:'Surat',talukas:['bardoli','chorasi','kamrej','mahuva','mandvi','mangrol','olpad','palsana','umarpada'],center:[21.15,73.0],zoom:10},
  navsari:{label:'Navsari',talukas:['bansda','chikhli','gandevi','jalalpore','navsarit'],center:[20.87,72.96],zoom:10},
  valsad:{label:'Valsad',talukas:['dharampur','pardi','umbergaon','valsadt','vapi'],center:[20.45,72.95],zoom:10}
};

var curDistrict='surat',curTaluka='bardoli';
var userLat=null,userLng=null,selV=null,allMarkers=[],tblSort='count';
var gpsWatching=false,gpsM=null,gpsC=null;

function gc(n){return n>=200?'#ef5350':n>=100?'#ff9800':n>=50?'#4caf50':'#78909c';}
function tier(n){return n>=200?'Very High':n>=100?'High':n>=50?'Medium':'Low';}
function hav(a,b,c,d){var R=6371,x=Math.sin((c-a)*Math.PI/360),y=Math.sin((d-b)*Math.PI/360),p=x*x+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*y*y;return R*2*Math.atan2(Math.sqrt(p),Math.sqrt(1-p));}
function fd(d){return d<1?(d*1000).toFixed(0)+' m':d.toFixed(1)+' km';}
function hasPDF(t,n){return DATA[t].pdfs.indexOf(n)>=0;}
function pdfURL(t,n){return GITHUB+t+'/'+encodeURIComponent(n)+'.pdf';}

var map=L.map('map').setView([21.15,73.0],10);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom:19
}).addTo(map);

function buildTalukaBar(){
  var bar=document.getElementById('taluka-bar');
  bar.innerHTML='';
  DISTRICTS[curDistrict].talukas.forEach(function(k){
    var b=document.createElement('button');
    b.className='tk-btn'+(k===curTaluka?' active':'');
    b.textContent=DATA[k].label;
    b.onclick=(function(tk,btn){return function(){setTaluka(tk,btn);};})(k,b);
    bar.appendChild(b);
  });
}

function setDistrict(d,btn){
  curDistrict=d;
  document.querySelectorAll('.dk-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  curTaluka=DISTRICTS[d].talukas[0];
  buildTalukaBar();
  closePanel();
  resetFilters();
  loadTaluka();
}

function setTaluka(k,btn){
  curTaluka=k;
  document.querySelectorAll('.tk-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  closePanel();
  resetFilters();
  loadTaluka();
}

function resetFilters(){
  ['fb-all','fb-high','fb-med','fb-low','fb-near'].forEach(function(id){document.getElementById(id).classList.remove('active');});
  document.getElementById('fb-all').classList.add('active');
}

function loadTaluka(){
  var td=DATA[curTaluka];
  allMarkers.forEach(function(o){map.removeLayer(o.marker);});
  allMarkers=[];
  var vs=td.villages;
  var tot=vs.reduce(function(s,v){return s+v.cnt;},0);
  var top=vs.slice().sort(function(a,b){return b.cnt-a.cnt;})[0];
  var mx=top.cnt;
  document.getElementById('s-total').textContent=tot.toLocaleString();
  document.getElementById('s-villages').textContent=vs.length;
  document.getElementById('s-top').textContent=top.n+' ('+top.cnt+')';
  document.getElementById('hdr-sub').textContent=DISTRICTS[curDistrict].label+' \u203a '+td.label+' \u00b7 '+vs.length+' villages';
  vs.forEach(function(v){
    v._mx=mx;
    var c=gc(v.cnt),r=8+Math.round((v.cnt/mx)*14),sz=r*2;
    var icon=L.divIcon({className:'',html:'<div style="width:'+sz+'px;height:'+sz+'px;background:'+c+';border:2px solid rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:'+(sz>26?10:8)+'px;font-weight:700;color:#fff;box-shadow:0 0 '+r+'px '+c+'55;cursor:pointer;">'+v.cnt+'</div>',iconSize:[sz,sz],iconAnchor:[r,r]});
    var m=L.marker([v.lat,v.lng],{icon:icon}).addTo(map);
    m.on('click',function(){openPanel(v);});
    allMarkers.push({marker:m,village:v});
  });
  map.setView(td.center,td.zoom);
  updateNear();
  if(document.getElementById('table-view').style.display==='flex')renderTable();
}

function openPanel(v){
  selV=v;
  var c=gc(v.cnt);
  document.getElementById('pv-name').textContent=v.n;
  document.getElementById('pv-meta').textContent='Code: '+v.c+' \u00b7 '+DATA[curTaluka].label+' Taluka, '+DISTRICTS[curDistrict].label;
  document.getElementById('pv-count').textContent=v.cnt;
  document.getElementById('pv-count').style.color=c;
  var b=document.getElementById('pv-badge');
  b.textContent=tier(v.cnt);b.style.background=c+'22';b.style.color=c;b.style.borderColor=c+'55';
  document.getElementById('pv-bar-fill').style.width=Math.round((v.cnt/v._mx)*100)+'%';
  document.getElementById('pv-bar-fill').style.background=c;
  document.getElementById('pv-dist').textContent=userLat!==null?'\ud83d\udccd '+fd(hav(userLat,userLng,v.lat,v.lng))+' from you':'\ud83d\udccd Tap GPS button to see distance';
  var has=hasPDF(curTaluka,v.n);
  var vb=document.getElementById('btn-view-panel'),db=document.getElementById('btn-dl-panel');
  if(has){vb.className='btn btn-view';vb.textContent='\ud83d\udc41 View PDF';db.className='btn btn-dl';db.textContent='\u2B07 Download';}
  else{vb.className='btn btn-na';vb.textContent='PDF soon';db.className='btn btn-na';db.textContent='PDF soon';}
  document.getElementById('panel').classList.add('open');
}
function closePanel(){document.getElementById('panel').classList.remove('open');selV=null;}
function navigateTo(){if(!selV)return;window.open('https://www.google.com/maps/dir/?api=1&destination='+selV.lat+','+selV.lng+'&travelmode=driving','_blank');}
function viewPDF(){if(!selV||!hasPDF(curTaluka,selV.n))return;window.open(pdfURL(curTaluka,selV.n),'_blank');}
function dlPDF(){
  if(!selV||!hasPDF(curTaluka,selV.n))return;
  var url=pdfURL(curTaluka,selV.n),name=selV.n;
  fetch(url).then(function(r){return r.blob();}).then(function(blob){
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name+'.pdf';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
  }).catch(function(){window.open(url,'_blank');});
}

function setFb(id){['fb-all','fb-high','fb-med','fb-low','fb-near'].forEach(function(x){document.getElementById(x).classList.remove('active');});document.getElementById(id).classList.add('active');}
function filterMap(t){
  setFb({all:'fb-all',high:'fb-high',medium:'fb-med',low:'fb-low'}[t]||'fb-all');
  allMarkers.forEach(function(o){
    var s=t==='all'||(t==='high'&&o.village.cnt>=150)||(t==='medium'&&o.village.cnt>=75&&o.village.cnt<150)||(t==='low'&&o.village.cnt<75);
    s?(!map.hasLayer(o.marker)&&o.marker.addTo(map)):(map.hasLayer(o.marker)&&map.removeLayer(o.marker));
  });
}
function sortByNearest(){
  if(userLat===null){alert('Tap the GPS button first');return;}
  setFb('fb-near');
  allMarkers.forEach(function(o){if(!map.hasLayer(o.marker))o.marker.addTo(map);});
  var s=DATA[curTaluka].villages.slice().sort(function(a,b){return hav(userLat,userLng,a.lat,a.lng)-hav(userLat,userLng,b.lat,b.lng);});
  map.setView([s[0].lat,s[0].lng],14);openPanel(s[0]);
}

function setPill(st,txt){var p=document.getElementById('gps-pill');p.className='';if(st==='on')p.classList.add('on');if(st==='err')p.classList.add('err');p.textContent=txt;}
function onPos(pos){
  userLat=pos.coords.latitude;userLng=pos.coords.longitude;
  setPill('on','\u25cf GPS On');
  if(gpsM){map.removeLayer(gpsM);map.removeLayer(gpsC);}
  gpsC=L.circle([userLat,userLng],{radius:pos.coords.accuracy,color:'#1976d2',fillColor:'#1976d2',fillOpacity:0.1,weight:1}).addTo(map);
  gpsM=L.marker([userLat,userLng],{icon:L.divIcon({className:'',html:'<div style="width:16px;height:16px;background:#1976d2;border:3px solid #fff;border-radius:50%;box-shadow:0 0 12px rgba(25,118,210,.9);"></div>',iconSize:[16,16],iconAnchor:[8,8]}),zIndexOffset:1000}).addTo(map);
  updateNear();
  if(selV)openPanel(selV);
}
function onErr(e){setPill('err',e.code===1?'\u26a0 Blocked':'\u26a0 GPS error');}
function requestGPS(){
  if(!navigator.geolocation){alert('Geolocation not supported');return;}
  setPill('','&#x27F3; Locating...');
  navigator.geolocation.getCurrentPosition(function(pos){
    onPos(pos);map.setView([pos.coords.latitude,pos.coords.longitude],13);
    if(!gpsWatching){gpsWatching=true;navigator.geolocation.watchPosition(onPos,onErr,{enableHighAccuracy:true,maximumAge:5000,timeout:20000});}
  },onErr,{enableHighAccuracy:true,timeout:20000});
}
function updateNear(){
  if(userLat===null)return;
  var s=DATA[curTaluka].villages.slice().sort(function(a,b){return hav(userLat,userLng,a.lat,a.lng)-hav(userLat,userLng,b.lat,b.lng);});
  document.getElementById('s-near').textContent=s[0].n+' ('+hav(userLat,userLng,s[0].lat,s[0].lng).toFixed(1)+'km)';
}

function switchTab(t){
  document.getElementById('tab-map').classList.toggle('active',t==='map');
  document.getElementById('tab-tbl').classList.toggle('active',t==='table');
  document.getElementById('map-view').style.display=t==='map'?'flex':'none';
  document.getElementById('table-view').style.display=t==='table'?'flex':'none';
  if(t==='map')map.invalidateSize();
  if(t==='table')renderTable();
}

function setSort(s){
  if(s==='dist'&&userLat===null){alert('Tap GPS button first');return;}
  tblSort=s;
  ['ts-count','ts-name','ts-dist'].forEach(function(x){document.getElementById(x).classList.remove('active');});
  document.getElementById('ts-'+s).classList.add('active');
  renderTable();
}

function renderTable(){
  var q=(document.getElementById('tbl-search').value||'').toLowerCase().trim();
  var vs=DATA[curTaluka].villages.filter(function(v){return !q||v.n.toLowerCase().indexOf(q)>=0;});
  if(tblSort==='count')vs.sort(function(a,b){return b.cnt-a.cnt;});
  else if(tblSort==='name')vs.sort(function(a,b){return a.n.localeCompare(b.n);});
  else if(tblSort==='dist'&&userLat!==null)vs.sort(function(a,b){return hav(userLat,userLng,a.lat,a.lng)-hav(userLat,userLng,b.lat,b.lng);});
  var mx=DATA[curTaluka].villages.reduce(function(m,v){return Math.max(m,v.cnt);},1);
  var html='';
  vs.forEach(function(v,i){
    var c=gc(v.cnt),dStr=userLat!==null?fd(hav(userLat,userLng,v.lat,v.lng)):'&#8212;',bw=Math.round((v.cnt/mx)*100),has=hasPDF(curTaluka,v.n);
    html+='<div class="tr" onclick="onRowTap(\''+v.c+'\')">'
      +'<span class="tr-rank">'+(i+1)+'</span>'
      +'<span class="tr-dot" style="background:'+c+'"></span>'
      +'<div class="tr-body"><div class="tr-name">'+v.n+'</div><div class="tr-sub">'+v.c+'</div>'
      +'<div class="tr-bb"><div class="tr-bf" style="width:'+bw+'%;background:'+c+'"></div></div></div>'
      +'<div class="tr-right"><div class="tr-count" style="color:'+c+'">'+v.cnt+'</div><div class="tr-dist">'+dStr+'</div></div>'
      +'<div class="tr-acts">'
      +'<button class="tr-go" onclick="event.stopPropagation();goNav('+v.lat+','+v.lng+')">Go</button>'
      +(has?'<button class="tr-view" onclick="event.stopPropagation();window.open(\''+pdfURL(curTaluka,v.n)+'\',\'_blank\')">View</button>':'')
      +(has?'<button class="tr-dl" onclick="event.stopPropagation();dlFile(\''+pdfURL(curTaluka,v.n)+'\',\''+v.n+'\')">DL</button>':'<button class="tr-na" disabled>PDF</button>')
      +'</div></div>';
  });
  if(!html)html='<p style="text-align:center;color:#1a3050;padding:30px 0;font-size:13px;">No villages found</p>';
  document.getElementById('tbl-wrap').innerHTML=html;
}

function onRowTap(code){
  var v=DATA[curTaluka].villages.find(function(x){return x.c===code;});
  if(!v)return;
  v._mx=DATA[curTaluka].villages.reduce(function(m,x){return Math.max(m,x.cnt);},1);
  switchTab('map');map.setView([v.lat,v.lng],14);openPanel(v);
}
function goNav(lat,lng){window.open('https://www.google.com/maps/dir/?api=1&destination='+lat+','+lng+'&travelmode=driving','_blank');}
function dlFile(url,name){
  fetch(url).then(function(r){return r.blob();}).then(function(blob){
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name+'.pdf';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
  }).catch(function(){window.open(url,'_blank');});
}

map.on('click',closePanel);
buildTalukaBar();
loadTaluka();
</script>
</body>
</html>
